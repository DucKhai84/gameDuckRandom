<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Realistic Horse Race Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #222;
            font-family: 'Segoe UI', sans-serif;
            user-select: none;
        }

        #world-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            overflow: visible;
            will-change: transform;
        }

        .horse-runner {
            position: absolute;
            top: 0;
            left: 0;
            width: 80px; /* To hơn chút cho rõ */
            height: 64px;
            margin-left: -40px;
            margin-top: -32px;
            will-change: transform;
        }

        #ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: linear-gradient(to bottom, #2e7d32, #1b5e20);
            border-bottom: 5px solid #003300;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        label {
            color: #a5d6a7;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        input {
            width: 50px;
            padding: 5px;
            text-align: center;
            font-weight: bold;
            border-radius: 6px;
            border: none;
            font-size: 16px;
            height: 30px;
            background: #e8f5e9;
            color: #1b5e20;
        }

        #timer {
            background: #fff;
            border: 3px solid #000;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 28px;
            font-weight: bold;
            padding: 2px 10px;
            min-width: 130px;
            text-align: center;
            color: #222;
        }

        button {
            padding: 10px 20px;
            font-weight: bold;
            font-size: 14px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            color: white;
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.3);
            text-transform: uppercase;
            transition: transform 0.1s;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: none;
        }

        #btn-start { background: #ffca28; color: #e65100; font-size: 16px; }
        #btn-reset { background: #e53935; }

        #scenario-alert {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%) scale(0);
            background: rgba(27, 94, 32, 0.95);
            color: #fff;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 24px;
            pointer-events: none;
            border: 3px solid #66bb6a;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 150;
            text-align: center;
        }

        #scenario-alert span {
            display: block;
            font-size: 14px;
            color: #a5d6a7;
            font-weight: normal;
            margin-top: 5px;
        }

        #rank-board {
            position: fixed;
            top: 90px;
            right: 10px;
            width: 160px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border-radius: 8px;
            padding: 10px;
            font-size: 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            pointer-events: none;
        }

        .r-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dashed #555;
            padding: 5px 0;
            align-items: center;
        }

        .r-1 { color: #ffeb3b; font-weight: bold; font-size: 14px; }
        .strat-tag { font-size: 9px; padding: 1px 4px; border-radius: 4px; margin-left: 5px; text-transform: uppercase; }

        #winner-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 200;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .win-box {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            border: 8px solid #ffca28;
            animation: popUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            box-shadow: 0 0 50px rgba(255, 202, 40, 0.5);
        }

        #win-canvas { width: 200px; height: 150px; margin: 10px 0; }
        .win-title { font-size: 24px; color: #555; text-transform: uppercase; letter-spacing: 2px; margin: 0; }
        .win-name { font-size: 50px; color: #e65100; margin: 0; font-weight: 900; text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.1); }
        .crown { font-size: 60px; margin-bottom: -20px; animation: float 2s infinite ease-in-out; }

        @keyframes popUp { from { transform: scale(0) } to { transform: scale(1) } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>

<body>

    <div id="ui-layer">
        <div class="input-group">
            <label>Số Ngựa</label>
            <input type="number" id="inp-qty" value="12" min="2" max="50">
        </div>
        <div class="input-group">
            <label>Giây</label>
            <input type="number" id="inp-time" value="45" min="10" max="600">
        </div>
        <div id="timer">00:00.0</div>
        <button id="btn-start" onclick="startGame()">ĐUA NGAY</button>
        <button id="btn-reset" onclick="resetGame()">RESET</button>
    </div>

    <div id="scenario-alert">MODE NAME<span>Description</span></div>
    <div id="rank-board">
        <div id="rank-list">---</div>
    </div>

    <div id="world-layer"></div>

    <div id="winner-screen">
        <div class="win-box">
            <div class="crown">👑</div>
            <h2 class="win-title">Vô Địch</h2>
            <canvas id="win-canvas" width="400" height="300"></canvas>
            <h1 id="win-name" class="win-name">#1</h1>
            <button id="btn-start" onclick="resetGame()" style="margin-top: 20px;">ĐUA LẠI</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script>
        const horseGifSrc = 'horse.gif';
        const horseImgStatic = new Image();
        horseImgStatic.src = horseGifSrc;

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (type === 'whistle') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(800, now); osc.frequency.linearRampToValueAtTime(1500, now + 0.1);
                gain.gain.setValueAtTime(0.3, now); gain.gain.linearRampToValueAtTime(0, now + 0.5); osc.start(now); osc.stop(now + 0.5);
            } else if (type === 'hoof') { // Tiếng vó ngựa (trầm)
                let buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
                let data = buffer.getChannelData(0);
                for (let i = 0; i < buffer.length; i++) data[i] = (Math.random() - 0.5) * Math.exp(-i / (audioCtx.sampleRate * 0.02));
                let noise = audioCtx.createBufferSource(); noise.buffer = buffer;
                let filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 200;
                let g = audioCtx.createGain(); g.gain.value = 0.1;
                noise.connect(filter); filter.connect(g); g.connect(audioCtx.destination);
                noise.start(now);
            } else if (type === 'win') {
                let f = [523, 659, 784, 1046];
                f.forEach((freq, i) => {
                    let o = audioCtx.createOscillator(); let g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination);
                    o.type = 'square'; o.frequency.value = freq; g.gain.setValueAtTime(0.05, now + i * 0.1); g.gain.linearRampToValueAtTime(0, now + i * 0.1 + 0.3);
                    o.start(now + i * 0.1); o.stop(now + i * 0.1 + 0.3);
                });
            }
        }

        const ENGINE = Matter.Engine, BODIES = Matter.Bodies, COMPOSITE = Matter.Composite, BODY = Matter.Body;
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width = window.innerWidth, height = window.innerHeight;
        canvas.width = width; canvas.height = height;
        window.addEventListener('resize', () => { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; });

        const MAP_LENGTH = 10000; // Đường đua dài hơn
        const TOP_MARGIN = 100;
        const START_LINE = 200;
        const FINISH_LINE = MAP_LENGTH - 600;

        const engine = ENGINE.create(); engine.gravity.y = 0;
        const world = engine.world;

        let ducks = []; // Thực ra là Horses
        let rocks = [];
        let bananas = [];
        let logs = [];
        let dusts = [];
        let lightnings = [];
        
        // Cấu hình chiến thuật
        const STRATEGIES = {
            'LEADER': { name: 'Dẫn Đầu', color: '#4caf50', boostStart: 1.3, boostEnd: 0.8 }, // Nhanh đầu, đuối cuối
            'CLOSER': { name: 'Nước Rút', color: '#f44336', boostStart: 0.8, boostEnd: 1.5 }, // Chậm đầu, cực nhanh cuối
            'PACER':  { name: 'Bền Bỉ',  color: '#2196f3', boostStart: 1.0, boostEnd: 1.05 }, // Ổn định
            'WILD':   { name: 'Điên Cuồng',color: '#9c27b0', boostStart: 1.1, boostEnd: 1.1 }  // Biến thiên ngẫu nhiên cao
        };

        let isRacing = false;
        let isRainMode = false;
        let startTime = 0;
        let cameraX = 0;
        let globalTimer = 0;
        let flashOpacity = 0;

        function generateHorseColor() {
            const rand = Math.random();
            if (rand < 0.25) { // Ngựa đen/trắng/xám
                const shade = 0.4 + Math.random() * 1.0;
                return `grayscale(100%) brightness(${shade}) contrast(1.2)`;
            } else { // Ngựa màu nâu/đỏ/vàng
                const hue = Math.floor(Math.random() * 50) - 10; // -10 đến 40 độ (tông cam/nâu)
                const sat = 1.0 + Math.random() * 0.5;
                const bri = 0.6 + Math.random() * 0.4;
                return `hue-rotate(${hue}deg) saturate(${sat}) sepia(0.5) brightness(${bri})`;
            }
        }

        function spawnObstacles() {
            bananas = []; logs = [];
            let qty = ducks.length;
            
            // Ít chướng ngại vật hơn để tập trung vào đua tốc độ
            let logCount = 5 + Math.floor(qty * 0.2);
            for (let i = 0; i < logCount; i++) {
                let lx = START_LINE + 1000 + Math.random() * (MAP_LENGTH - 2000);
                let ly = TOP_MARGIN + 20 + Math.random() * (height - TOP_MARGIN - 40);
                
                // Gốc cây to hơn
                let logBody = BODIES.rectangle(lx, ly, 60, 20, { 
                    isStatic: true, 
                    angle: (Math.random() - 0.5),
                    label: 'log'
                });
                COMPOSITE.add(world, logBody);
                logs.push(logBody);
            }

            // Vỏ chuối
            let bananaCount = 8 + Math.floor(qty * 0.3);
            for (let i = 0; i < bananaCount; i++) {
                bananas.push({ x: START_LINE + 800 + Math.random() * (MAP_LENGTH - 1500), y: TOP_MARGIN + 20 + Math.random() * (height - TOP_MARGIN - 40), active: true });
            }
        }

        function drawWinnerAvatar(duck) {
            const wCanvas = document.getElementById('win-canvas');
            const wCtx = wCanvas.getContext('2d');
            wCtx.clearRect(0, 0, wCanvas.width, wCanvas.height);
            wCtx.save(); wCtx.translate(wCanvas.width / 2, wCanvas.height / 2); wCtx.scale(4, 4);
            if (duck.colorFilter) wCtx.filter = duck.colorFilter;
            wCtx.drawImage(horseImgStatic, -30, -25, 60, 50);
            wCtx.filter = 'none';
            wCtx.fillStyle = "white"; wCtx.font = "bold 14px Arial"; wCtx.textAlign = "center";
            wCtx.fillText(duck.id, 0, -10);
            wCtx.restore();
        }

        // --- CORE GAME LOOP ---
        function loop() {
            if (!isRacing && ducks.length === 0) {
                // Màn hình chờ
                ctx.fillStyle = isRainMode ? "#2e7d32" : "#388e3c";
                ctx.fillRect(0, 0, width, height);
                drawTrackMarkings(0);
                requestAnimationFrame(loop);
                return;
            }

            ENGINE.update(engine, 1000 / 60);
            globalTimer += 0.1;
            if (flashOpacity > 0) flashOpacity -= 0.02;

            let leaderX = 0;
            if (ducks.length > 0) leaderX = Math.max(...ducks.map(d => d.body.position.x));

            if (isRacing) {
                // 1. UPDATE BỤI
                for (let i = dusts.length - 1; i >= 0; i--) {
                    let d = dusts[i];
                    d.x += d.vx; d.y += d.vy; d.life -= 0.04; d.size += 0.3;
                    if (d.life <= 0) dusts.splice(i, 1);
                }

                // 2. UPDATE NGỰA (PHYSICS & AI)
                const progress = Math.max(0, Math.min(1, (leaderX - START_LINE) / (FINISH_LINE - START_LINE)));
                
                ducks.forEach(d => {
                    let dX = d.body.position.x;
                    let dY = d.body.position.y;
                    
                    // --- LOGIC CHIẾN THUẬT ---
                    let strategyMult = 1.0;
                    if (progress < 0.3) strategyMult = d.strategyData.boostStart; // Giai đoạn đầu
                    else if (progress > 0.8) strategyMult = d.strategyData.boostEnd; // Giai đoạn cuối
                    else strategyMult = 1.0; // Giữa trận

                    // Random biến thiên nhỏ để không bị cứng
                    let variance = 0.95 + Math.random() * 0.1; 
                    if (d.strategy === 'WILD') variance = 0.8 + Math.random() * 0.4;

                    // --- TRẠNG THÁI ---
                    if (d.status === 'NORMAL') {
                        // Check Chuối
                        for (let b of bananas) {
                            if (!b.active) continue;
                            if (Math.hypot(dX - b.x, dY - b.y) < 30) {
                                d.status = 'SLIPPING'; d.statusTimer = 40; b.active = false; playSound('slip');
                                BODY.setVelocity(d.body, { x: d.body.velocity.x * 0.5, y: (Math.random() - 0.5) * 5 }); 
                                break;
                            }
                        }
                    }
                    if (d.statusTimer > 0) { d.statusTimer--; if (d.statusTimer <= 0) d.status = 'NORMAL'; }

                    // --- ÁP DỤNG LỰC ---
                    if (d.status === 'NORMAL') {
                        let targetSpeed = d.baseSpeed * strategyMult * variance;
                        // Giảm tốc nếu mưa
                        if (isRainMode) targetSpeed *= 0.9;
                        
                        // Set vận tốc trực tiếp để mượt mà hơn (thay vì applyForce liên tục gây giật)
                        // Tuy nhiên vẫn cho phép va chạm vật lý làm lệch
                        let currentVx = d.body.velocity.x;
                        let newVx = currentVx + (targetSpeed - currentVx) * 0.05; // Lerp velocity
                        
                        // GALLOP MOTION (Nhấp nhô)
                        // Tính chu kỳ phi: sin theo thời gian + tốc độ
                        let gallopPhase = Math.sin(globalTimer * 2 + d.id); 
                        d.gallopOffset = gallopPhase * 4; // Nhấp nhô 4px

                        // TẠO BỤI KHI CHÂN CHẠM ĐẤT (gallopPhase xuống thấp)
                        if (gallopPhase > 0.8 && Math.random() < 0.5) {
                            let dustColor = isRainMode ? "rgba(62, 39, 35," : "rgba(215, 204, 200,";
                            dusts.push({
                                x: dX - 30, // Sau vó ngựa
                                y: dY + 25, 
                                vx: -2 - Math.random() * 2, vy: -1 - Math.random(),
                                size: 4 + Math.random() * 6, life: 1.0, color: dustColor
                            });
                        }

                        BODY.setVelocity(d.body, { x: newVx, y: (Math.random()-0.5)*0.5 }); // Giữ Y ổn định
                    } else if (d.status === 'SLIPPING') {
                         d.gallopOffset = 0;
                    }

                    // Khóa xoay
                    BODY.setAngularVelocity(d.body, 0); 
                    BODY.setAngle(d.body, 0);
                });
                
                updateTimerUI();
            }

            // Camera follow smoothly
            if (ducks.length > 0) {
                let targetCam = leaderX - width * 0.4; // Camera lệch trái một chút để thấy phía trước
                targetCam = Math.max(0, Math.min(targetCam, FINISH_LINE - width + 500));
                cameraX += (targetCam - cameraX) * 0.1;
            }

            updateHorseDOM();

            // --- DRAWING ---
            ctx.clearRect(0, 0, width, height);
            
            // Vẽ nền cỏ
            ctx.fillStyle = isRainMode ? "#2e7d32" : "#388e3c";
            ctx.fillRect(0, 0, width, height);

            ctx.save(); 
            ctx.translate(-cameraX, 0);

            drawTrackMarkings(cameraX); // Vẽ làn và mốc khoảng cách
            drawDust();
            drawLogs(); 
            drawBananas();

            // Không vẽ ngựa ở đây (dùng DOM), chỉ vẽ info
            drawHorseInfo();

            if (isRainMode) { drawRain(cameraX); drawLightnings(); }
            if (flashOpacity > 0) { ctx.fillStyle = `rgba(255, 255, 255, ${flashOpacity})`; ctx.fillRect(cameraX, 0, width, height); }
            
            ctx.restore();

            if (isRacing) updateRankUI();

            // Check Win
            if (isRacing && leaderX >= FINISH_LINE) {
                let winner = ducks.find(d => d.body.position.x >= FINISH_LINE);
                if (winner) {
                    isRacing = false; playSound('win');
                    document.getElementById('win-name').innerText = "Ngựa #" + winner.id;
                    document.getElementById('winner-screen').style.display = 'flex';
                    confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 }, colors: ['#ffd700', '#ffffff', '#388e3c'] });
                    drawWinnerAvatar(winner);
                }
            }
            requestAnimationFrame(loop);
        }

        // Cập nhật vị trí thẻ IMG (DOM)
        function updateHorseDOM() {
            const worldLayer = document.getElementById('world-layer');
            worldLayer.style.transform = `translateX(${-cameraX}px)`;
            ducks.forEach(d => {
                if (d.element) {
                    let angle = (d.status === 'SLIPPING') ? 0.5 : 0;
                    // Áp dụng offset nhấp nhô vào Y
                    let visualY = d.body.position.y + d.gallopOffset;
                    d.element.style.transform = `translate(${d.body.position.x}px, ${visualY}px) rotate(${angle}rad)`;
                }
            });
        }

        function drawTrackMarkings(camX) {
            // 1. Vẽ làn chạy (Lanes)
            ctx.strokeStyle = "rgba(255, 255, 255, 0.15)";
            ctx.lineWidth = 2;
            // Vẽ đường kẻ ngang mờ mờ
            if (ducks.length > 0) {
                 // Ước lượng chiều cao làn dựa trên số lượng ngựa lúc start
                 let laneH = (height - TOP_MARGIN - 100) / ducks.length;
                 // Chỉ vẽ khoảng 5-10 đường tượng trưng
                 for(let y = TOP_MARGIN; y < height; y += laneH * 2) {
                     ctx.beginPath(); ctx.moveTo(camX, y); ctx.lineTo(camX + width, y); ctx.stroke();
                 }
            }

            // 2. Vẽ biển báo khoảng cách (Distance Markers)
            ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
            ctx.font = "bold 40px Impact";
            ctx.textAlign = "center";
            ctx.textBaseline = "bottom";
            
            // Vẽ vạch đích và vạch xuất phát
            ctx.fillStyle = "#fff";
            for(let y = TOP_MARGIN; y < height; y+=40) {
                 // Start Checkers
                 ctx.fillRect(START_LINE, y, 20, 20); ctx.fillRect(START_LINE+20, y+20, 20, 20);
                 // Finish Checkers
                 ctx.fillRect(FINISH_LINE, y, 40, 40); ctx.fillRect(FINISH_LINE+40, y+40, 40, 40);
            }
            // Cột đỏ đích
            ctx.fillStyle = "#d32f2f"; ctx.fillRect(FINISH_LINE - 5, TOP_MARGIN - 50, 10, height);

            // Các mốc mét (cứ 1000px là 1 mốc)
            for (let x = 0; x <= MAP_LENGTH; x += 1000) {
                if (x < camX - 200 || x > camX + width + 200) continue;
                // Vạch kẻ dọc
                ctx.strokeStyle = "rgba(255, 255, 255, 0.3)";
                ctx.beginPath(); ctx.moveTo(x, TOP_MARGIN); ctx.lineTo(x, height); ctx.stroke();
                
                // Số mét
                ctx.save();
                ctx.translate(x, TOP_MARGIN + 20);
                ctx.fillStyle = "rgba(255,255,255,0.6)";
                ctx.fillText((x/10) + "m", 0, 0);
                ctx.restore();
            }
        }

        function drawDust() {
            dusts.forEach(d => {
                ctx.fillStyle = d.color + d.life + ")";
                ctx.beginPath();
                ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawLogs() {
            ctx.fillStyle = "#4e342e"; ctx.strokeStyle = "#3e2723"; ctx.lineWidth = 3;
            logs.forEach(l => {
                ctx.save(); ctx.translate(l.position.x, l.position.y); ctx.rotate(l.angle);
                ctx.beginPath(); ctx.roundRect(-30, -10, 60, 20, 5); ctx.fill(); ctx.stroke();
                ctx.restore();
            });
        }
        
        function drawBananas() { ctx.font = "24px Arial"; ctx.textAlign = "center"; bananas.forEach(b => { if (b.active) ctx.fillText("🍌", b.x, b.y); }); }

        function drawHorseInfo() {
            ducks.forEach(d => {
                let x = d.body.position.x;
                // Vẽ info cao hơn vị trí Y vật lý + độ nảy
                let y = d.body.position.y + d.gallopOffset - 40;

                ctx.save(); ctx.translate(x, y);

                if (d.status === 'SLIPPING') { ctx.font = "20px Arial"; ctx.fillText("💫", 0, 0); }
                
                // Vẽ số thứ tự
                ctx.fillStyle = "white";
                ctx.font = "bold 14px Arial";
                ctx.textAlign = "center";
                ctx.shadowColor = "black"; ctx.shadowBlur = 4;
                ctx.fillText(d.id, 0, 0);
                
                // Vẽ thanh thể lực/chiến thuật (dot màu nhỏ)
                ctx.fillStyle = STRATEGIES[d.strategy].color;
                ctx.beginPath(); ctx.arc(0, -15, 4, 0, Math.PI*2); ctx.fill();

                ctx.restore();
            });
        }

        function drawRain(camX) {
            ctx.strokeStyle = "rgba(200, 230, 255, 0.3)"; ctx.lineWidth = 2; ctx.beginPath();
            let startRainX = Math.floor(camX / 100) * 100;
            for (let i = 0; i < 100; i++) {
                let rx = startRainX + Math.random() * width; let ry = TOP_MARGIN + Math.random() * (height - TOP_MARGIN);
                ctx.moveTo(rx, ry); ctx.lineTo(rx - 20, ry + 40);
            }
            ctx.stroke();
        }
        function drawLightnings() {
             // ... (Giữ nguyên logic cũ nếu muốn, hoặc đơn giản hóa)
        }

        function startGame() {
            if (isRacing) return;
            playSound('whistle');
            COMPOSITE.clear(world); ENGINE.clear(engine);
            ducks = []; rocks = []; dusts = [];
            document.getElementById('world-layer').innerHTML = '';

            isRainMode = Math.random() < 0.3;
            const uiLayer = document.getElementById('ui-layer');
            const alertBox = document.getElementById('scenario-alert');

            if (isRainMode) {
                uiLayer.style.background = "linear-gradient(to bottom, #1b5e20, #2e7d32)";
                alertBox.innerHTML = `⛈️ MƯA LỚN<span>Đường trơn trượt!</span>`;
            } else {
                uiLayer.style.background = "linear-gradient(to bottom, #2e7d32, #1b5e20)";
                alertBox.innerHTML = `☀️ ĐẸP TRỜI<span>Điều kiện lý tưởng!</span>`;
            }
            alertBox.style.transform = "translateX(-50%) scale(1)"; setTimeout(() => { alertBox.style.transform = "translateX(-50%) scale(0)"; }, 2000);

            let qty = parseInt(document.getElementById('inp-qty').value);
            let time = parseInt(document.getElementById('inp-time').value);
            // Tính toán tốc độ trung bình cần thiết
            let avgSpeed = (FINISH_LINE - START_LINE) / (time * 60); 
            let availableHeight = height - TOP_MARGIN - 100;
            let laneHeight = availableHeight / qty;

            const stratKeys = Object.keys(STRATEGIES);

            for (let i = 0; i < qty; i++) {
                let x = START_LINE - 40;
                let y = TOP_MARGIN + 50 + (i * laneHeight);
                
                // QUAN TRỌNG: collisionFilter group -1 giúp chúng KHÔNG va chạm nhau
                // Nhưng vẫn va chạm với tường (default category) nếu tường không set group
                let body = BODIES.circle(x, y, 20, { 
                    frictionAir: 0.05, 
                    restitution: 0,
                    collisionFilter: { group: -1 } 
                });

                const img = document.createElement('img');
                img.src = horseGifSrc;
                img.className = 'horse-runner';
                const randomFilter = generateHorseColor();
                img.style.filter = randomFilter;
                document.getElementById('world-layer').appendChild(img);

                // Random chiến thuật
                let stratKey = stratKeys[Math.floor(Math.random() * stratKeys.length)];

                ducks.push({
                    id: i + 1,
                    body: body,
                    element: img,
                    colorFilter: randomFilter,
                    baseSpeed: avgSpeed * (0.85 + Math.random() * 0.3), // Base speed variation
                    strategy: stratKey,
                    strategyData: STRATEGIES[stratKey],
                    gallopOffset: 0,
                    status: 'NORMAL', statusTimer: 0
                });
                COMPOSITE.add(world, body);
            }
            
            spawnObstacles();
            
            // Tường chắn trên dưới để không chạy ra ngoài map
            let wallTop = BODIES.rectangle(MAP_LENGTH/2, TOP_MARGIN - 50, MAP_LENGTH + 2000, 100, { isStatic: true });
            let wallBot = BODIES.rectangle(MAP_LENGTH/2, height + 50, MAP_LENGTH + 2000, 100, { isStatic: true });
            COMPOSITE.add(world, [wallTop, wallBot]);

            isRacing = true; 
            document.getElementById('winner-screen').style.display = 'none'; 
            startTime = Date.now();
            requestAnimationFrame(loop);
        }

        function resetGame() {
            isRacing = false; ducks = []; rocks = []; bananas = []; logs = []; dusts = [];
            COMPOSITE.clear(world);
            document.getElementById('world-layer').innerHTML = '';
            document.getElementById('timer').innerText = "00:00.0";
            document.getElementById('winner-screen').style.display = 'none';
            document.getElementById('scenario-alert').style.transform = "translateX(-50%) scale(0)";
            document.getElementById('rank-list').innerHTML = "---";
            cameraX = 0;
            requestAnimationFrame(() => {
                ctx.clearRect(0, 0, width, height);
                ctx.fillStyle = "#388e3c"; ctx.fillRect(0, 0, width, height);
                drawTrackMarkings(0);
            });
        }

        function updateTimerUI() { 
            let diff = Date.now() - startTime; 
            let ms = Math.floor((diff % 1000) / 100); 
            let s = Math.floor((diff / 1000) % 60); 
            let m = Math.floor(diff / 60000); 
            document.getElementById('timer').innerText = (m<10?"0"+m:m) + ":" + (s<10?"0"+s:s) + "." + ms; 
        }

        function updateRankUI() { 
            // Cập nhật BXH (Top 5)
            if (globalTimer % 10 < 1) { // Throttle update
                let sorted = [...ducks].sort((a, b) => b.body.position.x - a.body.position.x); 
                let html = ""; 
                for (let i = 0; i < Math.min(6, sorted.length); i++) { 
                    let d = sorted[i];
                    let stratName = STRATEGIES[d.strategy].name;
                    let stratColor = STRATEGIES[d.strategy].color;
                    html += `<div class="r-item">
                        <span class="${i===0?'r-1':''}">${i+1}. Ngựa #${d.id}</span>
                        <span class="strat-tag" style="background:${stratColor}">${stratName}</span>
                    </div>`; 
                } 
                document.getElementById('rank-list').innerHTML = html; 
            }
        }
    </script>
</body>
</html>
